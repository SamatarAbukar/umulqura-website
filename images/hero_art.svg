<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Open book with radiating light and the Arabic wordmark أم القرى, inspired by the Umul Qura logo">
  <style>
    #emblem, #rays, #glow, #medallion, .tw { transform-box: fill-box; transform-origin: center; }
    #emblem { animation: float 7s ease-in-out infinite alternate; }
    #rays { animation: breathe 6s ease-in-out infinite alternate; }
    #glow { animation: pulse 6s ease-in-out infinite alternate; }
    #medallion { animation: spin 90s linear infinite; }
    #flippage { transform-box: fill-box; transform-origin: 0% 50%; opacity: 0; animation: flip 60s ease-in-out infinite; }
    .tw { animation: twinkle 4s ease-in-out infinite alternate; }
    .tw.d1 { animation-delay: -1s; } .tw.d2 { animation-delay: -2s; }
    .tw.d3 { animation-delay: -3s; } .tw.d4 { animation-delay: -1.6s; }
    @keyframes float   { from { transform: translateY(0); }    to { transform: translateY(-10px); } }
    @keyframes breathe { from { transform: scale(1); opacity: 0.75; } to { transform: scale(1.05); opacity: 1; } }
    @keyframes pulse   { from { opacity: 0.45; } to { opacity: 0.9; } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes twinkle { from { opacity: 0.15; } to { opacity: 0.85; } }
    /* One 60s cycle with 5 flips at uneven offsets, so gaps vary between ~7s and 15s */
    @keyframes flip {
      0%, 16.1%, 38.9%, 41.1%, 50.9%, 53.1%, 69.9%, 72.1%, 91.9%, 94.1%, 100%
                { transform: scaleX(1); opacity: 0; }
      14%, 39%, 51%, 70%, 92%
                { transform: scaleX(1); opacity: 1; }
      14.8%, 39.8%, 51.8%, 70.8%, 92.8%
                { transform: scaleX(0.08); }
      15.6%, 40.6%, 52.6%, 71.6%, 93.6%
                { transform: scaleX(-1); opacity: 1; }
      16%, 41%, 53%, 72%, 94%
                { transform: scaleX(-1); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      #emblem, #rays, #glow, #medallion, .tw, #flippage { animation: none; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#124a37"/>
      <stop offset="1" stop-color="#0b2e23"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0" stop-color="#eeac35" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#eeac35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldband" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eeac35"/>
      <stop offset="1" stop-color="#d38f12"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect width="800" height="1000" fill="url(#bg)"/>

  <!-- Twinkling 8-point stars -->
  <g fill="#edc782">
    <path class="tw"    transform="translate(150 175) scale(1.1)" d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
    <path class="tw d1" transform="translate(645 140) scale(0.8)" d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
    <path class="tw d2" transform="translate(700 330) scale(1.0)" d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
    <path class="tw d3" transform="translate(100 360) scale(0.9)" d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
    <path class="tw d4" transform="translate(300 105) scale(0.7)" d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
    <path class="tw d2" transform="translate(535 95)  scale(0.9)" d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
  </g>

  <g id="emblem">
    <!-- Soft golden halo behind the book -->
    <circle id="glow" cx="400" cy="450" r="260" fill="url(#halo)"/>

    <!-- Sun rays -->
    <g id="rays" stroke="#eeac35" stroke-width="5" stroke-linecap="round">
      <line x1="501" y1="423" x2="603" y2="396"/>
      <line x1="495" y1="406" x2="550" y2="380"/>
      <line x1="486" y1="390" x2="572" y2="330"/>
      <line x1="474" y1="376" x2="517" y2="333"/>
      <line x1="460" y1="364" x2="520" y2="278"/>
      <line x1="444" y1="355" x2="470" y2="300"/>
      <line x1="427" y1="349" x2="454" y2="247"/>
      <line x1="409" y1="345" x2="414" y2="286"/>
      <line x1="391" y1="345" x2="382" y2="241"/>
      <line x1="373" y1="349" x2="357" y2="291"/>
      <line x1="356" y1="355" x2="311" y2="260"/>
      <line x1="340" y1="364" x2="305" y2="315"/>
      <line x1="326" y1="376" x2="252" y2="302"/>
      <line x1="314" y1="390" x2="265" y2="355"/>
      <line x1="305" y1="406" x2="210" y2="361"/>
      <line x1="299" y1="423" x2="241" y2="407"/>
    </g>

    <!-- Rising sun peeking over the spine -->
    <path d="M358,462 A42,42 0 0 1 442,462 Z" fill="#edc782"/>

    <!-- Gold underside of the book -->
    <path d="M400,478 C335,435 255,420 168,430 L168,552 C255,542 340,557 400,598 C460,557 545,542 632,552 L632,430 C545,420 465,435 400,478 Z"
          fill="url(#goldband)"/>

    <!-- Open pages -->
    <path d="M400,470 C340,430 260,415 180,425 L180,540 C260,530 340,545 400,585 Z"
          fill="#faf8f2" stroke="#14573f" stroke-width="7" stroke-linejoin="round"/>
    <path d="M400,470 C460,430 540,415 620,425 L620,540 C540,530 460,545 400,585 Z"
          fill="#faf8f2" stroke="#14573f" stroke-width="7" stroke-linejoin="round"/>
    <!-- Page lines -->
    <g fill="none" stroke="#14573f" stroke-width="2.5" stroke-opacity="0.55">
      <path d="M395,505 C340,468 265,453 195,460"/>
      <path d="M395,535 C340,498 265,483 195,490"/>
      <path d="M405,505 C460,468 535,453 605,460"/>
      <path d="M405,535 C460,498 535,483 605,490"/>
    </g>

    <!-- Turning page: a copy of the right page that flips over the spine -->
    <g id="flippage">
      <path d="M400,470 C460,430 540,415 620,425 L620,540 C540,530 460,545 400,585 Z"
            fill="#faf8f2" stroke="#14573f" stroke-width="7" stroke-linejoin="round"/>
      <g fill="none" stroke="#14573f" stroke-width="2.5" stroke-opacity="0.55">
        <path d="M405,505 C460,468 535,453 605,460"/>
        <path d="M405,535 C460,498 535,483 605,490"/>
      </g>
    </g>

    <!-- Pen nib beneath the spine -->
    <path d="M400,700 L377,642 C377,618 388,605 400,598 C412,605 423,618 423,642 Z"
          fill="#eeac35" stroke="#d38f12" stroke-width="4" stroke-linejoin="round"/>
    <line x1="400" y1="640" x2="400" y2="682" stroke="#d38f12" stroke-width="4"/>
    <circle cx="400" cy="633" r="8" fill="#0e3b2e" stroke="#d38f12" stroke-width="3"/>
  </g>

