    <rect x="352" y="867" width="96" height="96"/>
    <rect x="352" y="867" width="96" height="96" transform="rotate(45 400 915)"/>
    <circle cx="400" cy="915" r="30" stroke-opacity="0.35"/>
  </g>
</svg>
